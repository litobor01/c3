<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-start: #667eea;
            --bg-end: #764ba2;
            --calc-bg: #ffffff;
            --calc-shadow: rgba(0, 0, 0, 0.3);
            --display-bg: #1a1a1a;
            --display-color: #ffffff;
            --btn-bg: #f0f0f0;
            --btn-color: #333333;
            --btn-hover: #e0e0e0;
            --btn-shadow: rgba(0, 0, 0, 0.2);
            --operator-bg: #667eea;
            --operator-hover: #5568d3;
            --equals-bg: #764ba2;
            --equals-hover: #653a8a;
            --clear-bg: #ff6b6b;
            --clear-hover: #ee5a5a;
            --toggle-bg: #f0f0f0;
            --toggle-color: #333333;
            --toggle-hover: #e0e0e0;
            --history-bg: #f8f8f8;
            --history-border: #e0e0e0;
            --history-title: #333333;
            --history-muted: #888888;
            --history-item-hover: #eeeeee;
            --history-result: #667eea;
        }

        [data-theme="dark"] {
            --bg-start: #1a1a2e;
            --bg-end: #0f3460;
            --calc-bg: #2d2d2d;
            --calc-shadow: rgba(0, 0, 0, 0.5);
            --display-bg: #0d0d0d;
            --display-color: #f0f0f0;
            --btn-bg: #404040;
            --btn-color: #e8e8e8;
            --btn-hover: #505050;
            --btn-shadow: rgba(0, 0, 0, 0.4);
            --operator-bg: #4a5fc1;
            --operator-hover: #3d50a8;
            --equals-bg: #6b3fa0;
            --equals-hover: #5a3488;
            --clear-bg: #d95555;
            --clear-hover: #c44444;
            --toggle-bg: #404040;
            --toggle-color: #e8e8e8;
            --toggle-hover: #505050;
            --history-bg: #252525;
            --history-border: #404040;
            --history-title: #e8e8e8;
            --history-muted: #888888;
            --history-item-hover: #353535;
            --history-result: #7b8ee8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            padding: 20px;
            transition: background 0.3s ease;
        }

        .app {
            display: flex;
            gap: 20px;
            align-items: stretch;
            max-width: 720px;
            width: 100%;
        }

        .calculator {
            background: var(--calc-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--calc-shadow);
            padding: 30px;
            max-width: 400px;
            width: 100%;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .calculator-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .theme-toggle {
            background: var(--toggle-bg);
            color: var(--toggle-color);
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-toggle:hover {
            background: var(--toggle-hover);
            transform: translateY(-1px);
        }

        .theme-toggle:active {
            transform: translateY(0);
        }

        .display {
            background: var(--display-bg);
            color: var(--display-color);
            font-size: 2.5rem;
            padding: 20px;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            overflow-wrap: break-word;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            background: var(--btn-bg);
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--btn-color);
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--btn-shadow);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px var(--btn-shadow);
        }

        .operator {
            background: var(--operator-bg);
            color: #ffffff;
        }

        .operator:hover {
            background: var(--operator-hover);
        }

        .equals {
            background: var(--equals-bg);
            color: #ffffff;
        }

        .equals:hover {
            background: var(--equals-hover);
        }

        .clear {
            background: var(--clear-bg);
            color: #ffffff;
        }

        .clear:hover {
            background: var(--clear-hover);
        }

        .zero {
            grid-column: span 2;
        }

        .history-panel {
            background: var(--calc-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--calc-shadow);
            padding: 20px;
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--history-title);
        }

        .history-clear {
            background: transparent;
            border: none;
            color: var(--history-muted);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
        }

        .history-clear:hover {
            color: var(--clear-bg);
            background: var(--history-item-hover);
            transform: none;
            box-shadow: none;
        }

        .history-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            max-height: 420px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid var(--history-border);
            background: var(--history-bg);
        }

        .history-item:hover {
            background: var(--history-item-hover);
        }

        .history-expression {
            display: block;
            font-size: 0.85rem;
            color: var(--history-muted);
            word-break: break-all;
        }

        .history-result {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--history-result);
            margin-top: 2px;
        }

        .history-empty {
            color: var(--history-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 40px 10px;
        }

        @media (max-width: 680px) {
            .app {
                flex-direction: column;
                align-items: center;
            }

            .calculator,
            .history-panel {
                max-width: 400px;
                width: 100%;
            }

            .history-panel {
                max-height: 240px;
            }

            .history-list {
                max-height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="calculator">
            <div class="calculator-header">
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">
                    <span id="themeIcon">🌙</span>
                    <span id="themeLabel">Тёмная</span>
                </button>
            </div>
            <div class="display" id="display">0</div>
            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="operator" onclick="appendOperator('/')">/</button>
                <button class="operator" onclick="appendOperator('*')">×</button>
                <button class="operator" onclick="deleteLast()">⌫</button>
                
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">-</button>
                
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>
                
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="equals" onclick="calculate()" rowspan="2">=</button>
                
                <button class="zero" onclick="appendNumber('0')">0</button>
                <button onclick="appendDecimal()">.</button>
            </div>
        </div>

        <aside class="history-panel">
            <div class="history-header">
                <span class="history-title">Журнал</span>
                <button class="history-clear" id="historyClear" type="button">Очистить</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </aside>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let shouldResetDisplay = false;
        let history = [];
        const MAX_HISTORY = 50;

        const themeToggle = document.getElementById('themeToggle');
        const historyList = document.getElementById('historyList');
        const historyClear = document.getElementById('historyClear');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');

        function updateThemeButton(theme) {
            const isDark = theme === 'dark';
            themeIcon.textContent = isDark ? '☀️' : '🌙';
            themeLabel.textContent = isDark ? 'Светлая' : 'Тёмная';
            themeToggle.setAttribute('aria-label', isDark ? 'Включить светлую тему' : 'Включить тёмную тему');
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeButton(theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        themeToggle.addEventListener('click', toggleTheme);
        updateThemeButton(document.documentElement.getAttribute('data-theme'));

        function loadHistory() {
            try {
                const saved = localStorage.getItem('calcHistory');
                if (saved) {
                    history = JSON.parse(saved);
                }
            } catch (error) {
                history = [];
            }
        }

        function saveHistory() {
            localStorage.setItem('calcHistory', JSON.stringify(history));
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<li class="history-empty">Пока нет операций</li>';
                return;
            }

            historyList.innerHTML = history.map(function (entry, index) {
                return '<li class="history-item" onclick="useHistoryResult(' + index + ')">' +
                    '<span class="history-expression">' + entry.expression + '</span>' +
                    '<span class="history-result">= ' + entry.result + '</span>' +
                    '</li>';
            }).join('');
        }

        function addHistoryEntry(expression, result) {
            history.unshift({ expression: expression, result: result });
            if (history.length > MAX_HISTORY) {
                history = history.slice(0, MAX_HISTORY);
            }
            saveHistory();
            renderHistory();
        }

        function clearHistory() {
            history = [];
            saveHistory();
            renderHistory();
        }

        function useHistoryResult(index) {
            currentInput = history[index].result;
            shouldResetDisplay = true;
            updateDisplay();
        }

        historyClear.addEventListener('click', clearHistory);
        loadHistory();
        renderHistory();

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (currentInput === '0') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }
            
            if (!currentInput.includes('.')) {
                currentInput += '.';
                updateDisplay();
            }
        }

        function appendOperator(operator) {
            if (shouldResetDisplay) {
                shouldResetDisplay = false;
            }
            
            const lastChar = currentInput[currentInput.length - 1];
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function calculate() {
            const displayExpression = currentInput;

            try {
                let expression = currentInput.replace(/×/g, '*');

                if (expression.includes('/0') && !expression.includes('/0.')) {
                    currentInput = 'Ошибка';
                    addHistoryEntry(displayExpression, 'Ошибка');
                    updateDisplay();
                    shouldResetDisplay = true;
                    return;
                }

                const result = Function('"use strict"; return (' + expression + ')')();

                if (isNaN(result) || !isFinite(result)) {
                    currentInput = 'Ошибка';
                    addHistoryEntry(displayExpression, 'Ошибка');
                } else {
                    currentInput = result.toString();
                    addHistoryEntry(displayExpression, currentInput);
                }

                updateDisplay();
                shouldResetDisplay = true;
            } catch (error) {
                currentInput = 'Ошибка';
                addHistoryEntry(displayExpression, 'Ошибка');
                updateDisplay();
                shouldResetDisplay = true;
            }
        }

        function clearDisplay() {
            currentInput = '0';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (shouldResetDisplay) {
                clearDisplay();
                return;
            }
            
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Поддержка клавиатуры
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendDecimal();
            } else if (key === '+') {
                appendOperator('+');
            } else if (key === '-') {
                appendOperator('-');
            } else if (key === '*') {
                appendOperator('*');
            } else if (key === '/') {
                event.preventDefault();
                appendOperator('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
